format = """
$directory\
$git_branch\
$character\
"""

add_newline = false

[character]
success_symbol = "[>](green)"
error_symbol = "[>](red)"

[directory]
format = "[$path ](blue)"
truncate_to_repo = false
truncation_length = 10
truncation_symbol = ".../"

[git_branch]
symbol = ""
format = '[$symbol $branch ](yellow)'
